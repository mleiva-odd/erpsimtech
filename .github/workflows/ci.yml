name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancelar runs en progreso si hay nuevo push al mismo branch (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Stub envs compartidos por todos los jobs.
# Prisma resuelve env() del schema al validar/generar y falla si faltan.
# NUNCA usar estos valores en producción.
#
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true → fuerza a actions/checkout,
# actions/setup-node, actions/upload-artifact a usar Node 24 internamente
# (en vez de Node 20 que está deprecado para junio 2026). Resuelve el
# warning "Node.js 20 actions are deprecated" del último CI run.
env:
  NEXTAUTH_SECRET: ci-stub-secret-32-chars-long-min-1234
  NEXTAUTH_URL: http://localhost:3000
  DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
  DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
  NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: stub_anon_key
  SUPABASE_SERVICE_ROLE_KEY: stub_service_role_key
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ───────── Lint + Typecheck (rápido, falla rápido) ─────────
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ───────── Build (más lento, valida runtime) ─────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # ───────── Unit Tests (Vitest) ─────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  # ───────── Integration Tests (Vitest + Postgres real) ─────────
  # Fase 25-3a. Levanta Postgres 17 como service, aplica migraciones reales,
  # corre los `*.integration.test.ts` que tocan la DB. Valida orquestadores
  # Prisma que las pruebas unit no cubren.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simtech_test
        options: >-
          --health-cmd "pg_isready -U postgres -d simtech_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/simtech_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/simtech_test?schema=public
      NEXTAUTH_SECRET: integration-test-secret-32-chars-min-1234
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub_anon_key
      SUPABASE_SERVICE_ROLE_KEY: stub_service_role_key
      ALLOW_SEED_DESTRUCTIVE: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  # ───────── Tests E2E (Playwright) ─────────
  # Habilitado en Fase 13. Corre contra un Postgres efímero levantado en
  # el mismo workflow. Aplica migraciones reales (no `db push`) para que
  # la DB de tests refleje exactamente lo que existe en producción.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node-version: ['24']
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # CI usa Postgres efímero local; sobreescribe el stub global de la sección env: superior.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/erp_test?schema=public
      NEXTAUTH_SECRET: ci-test-secret-32-chars-long-min-1234
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub_anon_key
      SUPABASE_SERVICE_ROLE_KEY: stub_service_role_key
      SEED_SUPERADMIN_PASSWORD: TestAdmin12345!
      SEED_COMPANY_ADMIN_PASSWORD: TestAdmin12345!
      SEED_MANAGER_PASSWORD: TestAdmin12345!
      SEED_CASHIER_PASSWORD: TestAdmin12345!
      # Permite que el seed corra contra una DB efímera (NO production).
      ALLOW_SEED_DESTRUCTIVE: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed test data
        run: npm run seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js (background)
        # Levantamos el server en background; Playwright se conecta a localhost:3000.
        # Usamos `npm run start` (no dev) para ejercitar el build de producción.
        run: |
          npm run start > nextjs.log 2>&1 &
          echo $! > nextjs.pid
          # Esperar a que el server arranque (máx 60s).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 -o /dev/null; then
              echo "Next.js up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Next.js no arrancó en 60s"
          cat nextjs.log
          exit 1

      - name: Run Playwright tests
        env:
          E2E_LOGIN_EMAIL: simtech@simtechgt.com
          E2E_LOGIN_PASSWORD: TestAdmin12345!
        run: npm run test:e2e

      - name: Stop Next.js
        if: always()
        run: |
          if [ -f nextjs.pid ]; then
            kill "$(cat nextjs.pid)" || true
          fi

      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
