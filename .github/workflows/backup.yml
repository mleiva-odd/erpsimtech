name: Backup DB (Supabase)

# Fase 26 · Backup automatizado diario de Supabase Postgres.
#
# Corre todos los días a las 06:00 UTC (00:00 hora GT) via pg_dump y sube
# el archivo .sql.gz como artifact GitHub Actions (retención 30 días).
#
# REQUISITOS (configurar en GitHub repo Settings → Secrets):
#   - DATABASE_URL_BACKUP: connection string Postgres (usar DIRECT_URL,
#     NO pooler, para que pg_dump pueda hacer COPY).
#
# Para restaurar: descargar artifact, gunzip, psql DATABASE_URL < dump.sql.
# Detalles completos en docs/runbook.md.
#
# NOTA: Supabase plan PRO ($25/mes) ofrece PITR backups que cubren esto sin
# este workflow. En FREE plan (current setup), este workflow es la red de
# seguridad. Migrar a PRO cuando el negocio lo justifique.

on:
  schedule:
    # 06:00 UTC = 00:00 hora Guatemala (UTC-6).
    - cron: '0 6 * * *'
  # Permite trigger manual desde la UI de Actions para backup on-demand.
  workflow_dispatch:
  # push con filtro de path: solo corre cuando se modifica este workflow.
  # Sirve dos propósitos:
  #  1. Smoke test del workflow al editarlo (lo ejecuta una vez para validar).
  #  2. Fuerza a GitHub a indexar el workflow en el sidebar (workflows que
  #     solo tienen schedule+dispatch a veces no aparecen hasta su primer run).
  push:
    branches: [main]
    paths:
      - '.github/workflows/backup.yml'

# Force Node 24 internamente en actions/checkout y actions/upload-artifact
# (resuelve warning de deprecación Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backup:
    name: pg_dump to artifact
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }}  # skip en forks
    steps:
      - name: Install Postgres 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt jammy-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # IMPORTANTE: Ubuntu 24.04 viene con postgresql-client-16 preinstalado.
          # El comando `pg_dump` del PATH apunta al 16 que NO puede dumpear
          # servers v17 (server version mismatch). Forzamos el binario 17 via
          # update-alternatives con prioridad alta.
          sudo update-alternatives --install /usr/bin/pg_dump pg_dump \
            /usr/lib/postgresql/17/bin/pg_dump 100
          pg_dump --version

      - name: pg_dump database
        env:
          DATABASE_URL_BACKUP: ${{ secrets.DATABASE_URL_BACKUP }}
        run: |
          # set -euo pipefail: exit code de pg_dump propaga aunque vaya por
          # pipe a gzip. Sin esto, pg_dump puede fallar silenciosamente y
          # gzip de un stream vacío devuelve 0 → backup vacío sin error.
          set -euo pipefail

          if [ -z "$DATABASE_URL_BACKUP" ]; then
            echo "::error::DATABASE_URL_BACKUP secret no configurado en repo Settings"
            exit 1
          fi
          DATE=$(date -u +%Y-%m-%d_%H%M)
          FILE="simtech-backup-${DATE}.sql.gz"
          echo "Generando $FILE ..."

          # Primero dump a archivo plano (separar pg_dump de gzip para mejor
          # diagnóstico de errores), después comprimir.
          DUMP_FILE="simtech-backup-${DATE}.sql"
          pg_dump \
            --no-owner \
            --no-privileges \
            --format=plain \
            --clean \
            --if-exists \
            --quote-all-identifiers \
            --verbose \
            "$DATABASE_URL_BACKUP" \
            > "$DUMP_FILE" 2> pg_dump.log

          # Validar que el dump tiene contenido REAL (no solo headers).
          # Un dump válido tiene CREATE TABLE statements.
          if ! grep -q "CREATE TABLE" "$DUMP_FILE"; then
            echo "::error::Backup vacío o inválido — pg_dump no generó CREATE TABLE statements"
            echo "::group::pg_dump stderr"
            cat pg_dump.log
            echo "::endgroup::"
            exit 1
          fi

          TABLES=$(grep -c "CREATE TABLE" "$DUMP_FILE")
          INSERTS=$(grep -c "INSERT INTO\|COPY .* FROM stdin" "$DUMP_FILE" || true)
          DUMP_SIZE=$(du -h "$DUMP_FILE" | cut -f1)
          echo "✓ Dump válido: $DUMP_SIZE, $TABLES tablas, $INSERTS bloques de data"

          # Comprimir
          gzip -9 "$DUMP_FILE"
          GZ_SIZE=$(du -h "$FILE" | cut -f1)
          echo "✓ Comprimido: $FILE ($GZ_SIZE)"
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.FILE }}
          path: ${{ env.FILE }}
          retention-days: 30
          if-no-files-found: error
